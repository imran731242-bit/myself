<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TITAN EXE</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
width:500px;
height:500px;
background:red;
filter:blur(180px);
opacity:0.15;
top:20%;
left:40%;
z-index:-1;
}

.container{
min-height:100vh;
display:flex;
justify-content:space-around;
align-items:center;
padding:40px;
}

/* LEFT SIDE */
.left{
max-width:500px;
}

.logo{
font-size:28px;
font-weight:bold;
margin-bottom:40px;
}

.logo span{
color:red;
}

.tagline{
color:red;
letter-spacing:4px;
margin-bottom:20px;
}

.hero{
font-size:90px;
font-weight:bold;
line-height:0.95;
text-shadow:0 0 10px red;
margin-bottom:20px;
}

.subtitle{
font-size:22px;
margin-bottom:25px;
}

.quote{
border-left:4px solid red;
padding-left:12px;
color:#bbb;
margin-bottom:30px;
}

.buttons{
display:flex;
gap:20px;
}

.btn{
padding:14px 30px;
border:1px solid red;
color:white;
text-decoration:none;
box-shadow:0 0 15px red;
transition:0.3s;
}

.btn:hover{
background:red;
}

/* CARD */
.card{
width:360px;
padding:25px;
background:rgba(20,20,20,0.8);
border:1px solid rgba(255,0,0,0.5);
border-radius:15px;
box-shadow:0 0 25px rgba(255,0,0,0.4);
backdrop-filter:blur(10px);
}

.profile{
display:flex;
flex-direction:column;
align-items:center;
}

.circle{
width:140px;
height:140px;
border-radius:50%;
border:4px solid red;
box-shadow:0 0 20px red;
overflow:hidden;
margin-bottom:15px;
}

.circle img{
width:100%;
height:100%;
object-fit:cover;
}

.name{
font-size:28px;
font-weight:bold;
}

.online{
color:#00ff66;
margin-top:8px;
margin-bottom:20px;
}

.card h3{
color:red;
margin-top:18px;
margin-bottom:10px;
}

.join{
display:block;
text-align:center;
margin-top:25px;
padding:15px;
background:red;
color:white;
text-decoration:none;
border-radius:10px;
box-shadow:0 0 20px red;
}

@media(max-width:900px){
.container{
flex-direction:column;
gap:50px;
text-align:center;
}

.hero{
font-size:60px;
}

.buttons{
justify-content:center;
}
}
</style>
</head>
<body>

<div class="container">

<div class="left">
<div class="logo">TITAN <span>EXE</span></div>

<div class="tagline">// NO EXCUSES. NO LIMITS.</div>

<div class="hero">
TITAN !!<br>
EXE
</div>

<div class="subtitle">[ TITAN ON TOP ]</div>

<div class="quote">
“While others sleep, I build.<br>
While others talk, I execute.”
</div>

<div class="buttons">
<a href="https://discord.gg/RB3tC5G5" class="btn">DISCORD</a>
<a href="https://discord.gg/RB3tC5G5" class="btn">DASHBOARD</a>
</div>
</div>

<div class="card">
<div class="profile">
<div class="circle">
<img src="profile.jpg">
</div>

<div class="name">SAHIL !!👑</div>
<div class="online">● ONLINE</div>
</div>

<h3>ABOUT ME</h3>
<p>Owner of TITAN EXE.</p>

<h3>SKILLS</h3>
<p>Python / Flask / Bot Dev</p>

<a href="https://discord.gg/RB3tC5G5" class="join">JOIN SERVER</a>
</div>

</div>

</body>
</html>
